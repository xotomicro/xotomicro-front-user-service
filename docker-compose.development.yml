version: "3"
services:
  xotomicro-front-user-service:
    env_file:
      - .env
    build:
      context: ./
      dockerfile: docker/dockerfile.development
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    container_name: xotomicro-front-user-service
    ports:
      - 7074:7074
    volumes:
      - ./:/app
